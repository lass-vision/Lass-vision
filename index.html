<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lass Vision</title>
<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#f5f5f5;
}

header {
  background: linear-gradient(90deg, #0b3d91, #ff6600);
  color:white;
  padding:40px;
  text-align:center;
}

h1 { margin:0; font-size:40px; }

section {
  padding:40px;
  text-align:center;
}

.card {
  background:white;
  padding:20px;
  margin:20px auto;
  max-width:500px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.btn {
  display:inline-block;
  padding:15px 25px;
  margin-top:15px;
  border-radius:30px;
  text-decoration:none;
  font-weight:bold;
}

.whatsapp { background:#25D366; color:white; }
.pay { background:#ff6600; color:white; }

input, textarea {
  width:90%;
  padding:10px;
  margin:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button {
  background:#0b3d91;
  color:white;
  padding:12px 20px;
  border:none;
  border-radius:20px;
}
</style>
</head>

<body>

<header>
  <h1>LASS VISION</h1>
  <p>Conception & Impression tout support</p>
</header>

<section>
  <div class="card">
    <h2>Nos Services</h2>
    <p>Maillots, T-shirts, Flyers, Bâches, Sérigraphie, etc.</p>
  </div>

  <div class="card">
    <h2>Commander</h2>
    <form action="https://formspree.io/f/TON_ID" method="POST">
      <input type="text" name="nom" placeholder="Votre nom" required>
      <input type="tel" name="telephone" placeholder="Téléphone">
      <textarea name="commande" placeholder="Votre commande"></textarea>
      <button type="submit">Envoyer</button>
    </form>
  </div>

  <div class="card">
    <h2>Paiement</h2>
    <p>Paiement via Wave / Orange Money</p>
    <p><strong>77 708 95 54</strong></p>
    <p>Envoyez la preuve sur WhatsApp</p>
    <a class="btn whatsapp" href="https://wa.me/221777089554">WhatsApp</a>
  </div>

</section>

</body>
</html>
