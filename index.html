<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lass Vision - Full Custom</title>

<style>
body {margin:0;font-family:Arial;background:#0f172a;color:white;}
header{height:80vh;background:url('banner.jpg') center/cover no-repeat;display:flex;align-items:center;justify-content:center;position:relative;text-align:center}
header::after{content:"";position:absolute;width:100%;height:100%;background:rgba(0,0,0,0.6)}
.hero{position:relative;z-index:1}
section{padding:40px 20px}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
.card{background:#1e293b;border-radius:15px;padding:15px;text-align:center}
.card img{width:100%;height:180px;object-fit:cover;border-radius:10px}
.btn{background:#22c55e;padding:10px 15px;border-radius:8px;color:white;text-decoration:none;display:inline-block;margin-top:10px}

.customizer{display:flex;flex-direction:column;align-items:center;gap:10px}
.canvas-box{position:relative;width:250px;height:300px;background:#fff;border-radius:10px;overflow:hidden}
.canvas-box img{width:100%;height:100%;object-fit:cover}
.text-overlay{position:absolute;color:black;font-weight:bold;text-align:center;width:100%}
.front{top:30%}
.back{top:60%}

input,select{padding:10px;border-radius:6px;border:none}

footer{text-align:center;padding:20px;background:#020617}
</style>
</head>

<body>

<header>
<div class="hero">
<h1>LASS VISION</h1>
<p>Personnalise tous tes produits</p>
</div>
</header>

<section>
<h2>Nos Produits</h2>
<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<h3>T-shirt personnalisé</h3>
<a class="btn" href="#custom">Personnaliser</a>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1518091043644-c1d4457512c6">
<h3>Maillot de foot</h3>
<a class="btn" href="#custom">Personnaliser</a>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1502134249126-9f3755a50d78">
<h3>Affiches / Tableaux</h3>
<a class="btn" href="#custom">Personnaliser</a>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1585386959984-a41552231658">
<h3>Cartes de visite</h3>
<a class="btn" href="#custom">Personnaliser</a>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1607082349566-187342175e2f">
<h3>Flyers</h3>
<a class="btn" href="#custom">Personnaliser</a>
</div>

</div>
</section>

<section id="custom">
<h2 style="text-align:center">Designer ton produit</h2>

<div class="customizer">

<div class="canvas-box">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<div class="text-overlay front" id="frontText">DEVANT</div>
<div class="text-overlay back" id="backText">DERRIÈRE</div>
</div>

<input type="text" id="frontInput" placeholder="Texte devant">
<input type="text" id="backInput" placeholder="Texte derrière">

<input type="file" id="imageUpload">

<select id="colorSelect">
<option value="white">Blanc</option>
<option value="black">Noir</option>
<option value="red">Rouge</option>
</select>

<a class="btn" id="orderBtn" target="_blank">Commander</a>

</div>
</section>

<footer>
<p>WhatsApp : 77 708 95 54</p>
</footer>

<script>
const frontInput=document.getElementById('frontInput');
const backInput=document.getElementById('backInput');
const frontText=document.getElementById('frontText');
const backText=document.getElementById('backText');
const orderBtn=document.getElementById('orderBtn');
const imageUpload=document.getElementById('imageUpload');
const canvasBox=document.querySelector('.canvas-box');

function update(){
frontText.innerText=frontInput.value||"DEVANT";
backText.innerText=backInput.value||"DERRIÈRE";

const msg=`Commande: Devant=${frontInput.value} Derrière=${backInput.value}`;
orderBtn.href=`https://wa.me/221777089554?text=${encodeURIComponent(msg)}`;
}

frontInput.addEventListener('input',update);
backInput.addEventListener('input',update);

imageUpload.addEventListener('change',function(){
const file=this.files[0];
if(file){
const reader=new FileReader();
reader.onload=function(e){
canvasBox.style.backgroundImage=`url(${e.target.result})`;
canvasBox.style.backgroundSize='cover';
}
reader.readAsDataURL(file);
}
});
</script>

</body>
</html>
